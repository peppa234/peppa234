<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Aicha Brihmouche — AI and Data Science engineering student and full-stack developer">
  <style>
    .mono { font-family: 'Courier New', Courier, monospace; }
    .title { font-family: Verdana, Geneva, 'DejaVu Sans', sans-serif; font-weight: bold; letter-spacing: 10px; }
    .sub { font-family: 'Courier New', Courier, monospace; letter-spacing: 5px; }
    .s1, .s2, .s3 { animation: tw 3.2s ease-in-out infinite; }
    .s2 { animation-delay: 1.1s; }
    .s3 { animation-delay: 2.2s; }
    @keyframes tw { 0%,100% { opacity: 0.9; } 50% { opacity: 0.15; } }
  </style>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8fb8ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#8fb8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#cdd8ff"/>
      <stop offset="45%" stop-color="#5a7fd6"/>
      <stop offset="100%" stop-color="#101838"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Void -->
  <rect width="1200" height="300" rx="14" fill="#030309"/>
  <rect x="1.5" y="1.5" width="1197" height="297" rx="12.5" fill="none" stroke="#8fb8ff" stroke-opacity="0.25"/>
  <ellipse cx="600" cy="160" rx="520" ry="180" fill="url(#glow)"/>

  <!-- HUD corner ticks -->
  <g stroke="#8fb8ff" stroke-opacity="0.55" stroke-width="2" fill="none">
    <path d="M 22 40 V 22 H 40"/>
    <path d="M 1160 22 H 1178 V 40"/>
    <path d="M 1178 260 V 278 H 1160"/>
    <path d="M 40 278 H 22 V 260"/>
  </g>

  <!-- Starfield -->
  <g fill="#f2f5ff">
    <g class="s1">
      <circle cx="80" cy="60" r="1.4"/><circle cx="240" cy="210" r="1.1"/><circle cx="410" cy="48" r="1.6"/>
      <circle cx="700" cy="240" r="1.2"/><circle cx="960" cy="70" r="1.5"/><circle cx="1120" cy="200" r="1.1"/>
      <circle cx="180" cy="140" r="1"/><circle cx="890" cy="150" r="1.3"/>
    </g>
    <g class="s2">
      <circle cx="140" cy="250" r="1.2"/><circle cx="330" cy="120" r="1.5"/><circle cx="540" cy="230" r="1"/>
      <circle cx="770" cy="55" r="1.4"/><circle cx="1040" cy="250" r="1.5"/><circle cx="1150" cy="60" r="1.2"/>
      <circle cx="620" cy="40" r="1.1"/>
    </g>
    <g class="s3">
      <circle cx="60" cy="180" r="1.1"/><circle cx="290" cy="35" r="1.2"/><circle cx="470" cy="150" r="1"/>
      <circle cx="840" cy="220" r="1.5"/><circle cx="1090" cy="130" r="1.3"/><circle cx="720" cy="130" r="1"/>
      <circle cx="380" cy="260" r="1.4"/>
    </g>
  </g>

  <!-- Orbit path with travelling spark -->
  <g transform="rotate(-4 600 190)">
    <ellipse cx="600" cy="190" rx="480" ry="58" fill="none" stroke="#8fb8ff" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 7"/>
    <circle r="3.5" fill="#ffb27a" filter="url(#soft)">
      <animateMotion dur="10s" repeatCount="indefinite" path="M 120 190 a 480 58 0 1 0 960 0 a 480 58 0 1 0 -960 0"/>
    </circle>
  </g>

  <!-- Ringed mini planet, right side -->
  <g transform="translate(1055 95)">
    <g transform="rotate(-18)">
      <path d="M -42 0 A 42 12 0 0 1 42 0" fill="none" stroke="#ffb27a" stroke-opacity="0.35" stroke-width="2"/>
    </g>
    <circle r="24" fill="url(#planet)" stroke="#8fb8ff" stroke-opacity="0.5"/>
    <g transform="rotate(-18)">
      <path d="M -42 0 A 42 12 0 0 0 42 0" fill="none" stroke="#ffd0a8" stroke-opacity="0.75" stroke-width="2"/>
    </g>
  </g>

  <!-- Text block -->
  <text x="600" y="92" text-anchor="middle" class="mono" font-size="13" fill="#8fb8ff" fill-opacity="0.85" letter-spacing="4">// MISSION LOG — ENSIA · ALGIERS</text>
  <text x="600" y="152" text-anchor="middle" class="title" font-size="44" fill="#f2f5ff" filter="url(#soft)">AICHA BRIHMOUCHE</text>
  <text x="600" y="196" text-anchor="middle" class="sub" font-size="14" fill="#9ba3c7">AI &amp; DATA SCIENCE ENGINEER · FULL-STACK DEVELOPER</text>

  <!-- Status chip -->
  <g class="mono" font-size="11">
    <rect x="472" y="220" width="256" height="26" rx="4" fill="#ffb27a" fill-opacity="0.08" stroke="#ffb27a" stroke-opacity="0.45"/>
    <circle cx="492" cy="233" r="3" fill="#ffb27a">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="506" y="237" fill="#ffc79b" letter-spacing="2">OPEN TO OPPORTUNITIES</text>
  </g>
</svg>
